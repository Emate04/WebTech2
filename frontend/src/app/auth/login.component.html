<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-icon">
        <mat-icon>inventory_2</mat-icon>
      </div>
      <h1>Nyilvántartó</h1>
      <p class="subtitle">Bejelentkezés a rendszerbe</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Felhasználónév</mat-label>
        <input matInput formControlName="name" placeholder="Adja meg a nevét" autocomplete="username">
        <mat-icon matPrefix>person</mat-icon>
        <mat-error>{{ getNameError() }}</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Jelszó</mat-label>
        <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'"
               placeholder="Adja meg a jelszavát" autocomplete="current-password">
        <mat-icon matPrefix>lock</mat-icon>
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error>{{ getPasswordError() }}</mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit"
              class="submit-btn" [disabled]="isLoading">
        <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
        <span *ngIf="!isLoading">Bejelentkezés</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Még nincs fiókja? <a routerLink="/register" class="link">Regisztráljon</a></p>
    </div>
  </div>
</div>
